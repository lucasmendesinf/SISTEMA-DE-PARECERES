<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ai Prof. offline</title>
  <meta name="theme-color" content="#196b52">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5faf7;color:#15231d;font:16px Arial,sans-serif}
    main{width:min(420px,calc(100% - 40px));text-align:center;background:#fff;border:1px solid #dbe7df;border-radius:12px;padding:32px;box-shadow:0 18px 50px rgba(20,35,28,.12)}
    img{width:150px;margin-bottom:18px}
    h1{font-size:24px;margin:0 0 10px}
    p{line-height:1.5;color:#64756d;margin:0 0 20px}
    button{border:0;border-radius:8px;background:#196b52;color:#fff;font-weight:700;padding:12px 18px;cursor:pointer}
  </style>
</head>
<body>
  <main>
    <img src="assets/ai-prof-logo-transparent.png" alt="Ai Prof.">
    <h1>Sem conexão no momento</h1>
    <p>O Ai Prof. precisa de internet para acessar seus dados, salvar pareceres e gerar documentos.</p>
    <button type="button" onclick="location.reload()">Tentar novamente</button>
  </main>
</body>
</html>
